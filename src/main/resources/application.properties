spring.application.name=logiroute

# DATASOURCE
spring.datasource.url=jdbc:mysql://localhost:3306/logiroute_db?useSSL=false&serverTimezone=America/Lima
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# THYMELEAF
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# LOGGING
logging.level.com.logiroute=DEBUG
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# SERVER
server.port=8080
server.error.include-message=always

# GUAVA + CACHE
logiroute.cache.expire-minutes=10
logiroute.rate-limiter.per-second=10