spring.application.name=logiroute

# ================================================================
# CONFIGURACION EXTERNA
# Las credenciales y secretos se reciben mediante variables de entorno.
# Usa scripts/run-local.ps1 (Windows) o scripts/run-local.sh (Linux/macOS).
# ================================================================

# DATASOURCE
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/logiroute_db?useSSL=false&serverTimezone=America/Lima}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:1234abc}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.open-in-view=true

# SQL INIT (ejecutar schema.sql manualmente)
spring.sql.init.mode=never

# THYMELEAF
spring.thymeleaf.cache=${THYMELEAF_CACHE:false}
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# LOGGING
logging.level.com.logiroute=${LOG_LEVEL:INFO}
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# SERVER
server.port=${SERVER_PORT:8080}
server.error.include-message=${ERROR_INCLUDE_MESSAGE:always}

# GUAVA + RATE LIMITER
logiroute.cache.expire-minutes=${CACHE_EXPIRE_MINUTES:10}
logiroute.rate-limiter.per-second=${RATE_LIMIT_PER_SECOND:10}

# JWT
# JWT_SECRET debe contener al menos 32 caracteres.
jwt.secret=${JWT_SECRET:logiroute-local-development-secret-key-2026-change-before-production}
jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:8080}
