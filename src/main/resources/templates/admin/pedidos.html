<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiRoute - Pedidos</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">LogiRoute</div>
        <div class="nav-links">
            <a th:href="@{/admin}">Dashboard</a>
            <a th:href="@{/admin/pedidos}" class="active">Pedidos</a>
            <a th:href="@{/admin/repartidores}">Repartidores</a>
            <a th:href="@{/logout}" class="btn-logout">Salir</a>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>Gestión de Pedidos</h1>
        </div>

        <table class="data-table">
            <thead>
                <tr>
                    <th>Código</th>
                    <th>Cliente</th>
                    <th>Origen</th>
                    <th>Destino</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="pedido : ${pedidos}">
                    <td th:text="${pedido.codigo}"></td>
                    <td th:text="${pedido.cliente.usuario.nombre}"></td>
                    <td th:text="${pedido.direccionOrigen}"></td>
                    <td th:text="${pedido.direccionDestino}"></td>
                    <td>
                        <span class="badge" th:text="${pedido.estado}"></span>
                    </td>
                    <td>
                        <a th:href="@{/api/pedidos/{id}(id=${pedido.id})}" class="btn btn-small">Ver</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(pedidos)}">
                    <td colspan="6" class="text-center">No hay pedidos registrados</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
