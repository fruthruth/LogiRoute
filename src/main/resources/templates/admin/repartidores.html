<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiRoute - Repartidores</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">LogiRoute</div>
        <div class="nav-links">
            <a th:href="@{/admin}">Dashboard</a>
            <a th:href="@{/admin/pedidos}">Pedidos</a>
            <a th:href="@{/admin/repartidores}" class="active">Repartidores</a>
            <a th:href="@{/logout}" class="btn-logout">Salir</a>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>Gestión de Repartidores</h1>
        </div>

        <table class="data-table">
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Licencia</th>
                    <th>Teléfono</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="repartidor : ${repartidores}">
                    <td th:text="${repartidor.usuario.nombre}"></td>
                    <td th:text="${repartidor.licencia}"></td>
                    <td th:text="${repartidor.telefono}"></td>
                    <td>
                        <span class="badge" th:text="${repartidor.estado}"></span>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(repartidores)}">
                    <td colspan="4" class="text-center">No hay repartidores registrados</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
