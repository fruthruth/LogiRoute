<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiRoute - Iniciar Sesión</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}" href="../css/style.css">
</head>
<body class="login-page">

    <!-- Volver al inicio -->
    <a th:href="@{/}" href="/" class="login-back">
        <span class="back-arrow">←</span> Volver al inicio
    </a>

    <!-- Card de login -->
    <div class="login-card">

        <!-- Logo -->
        <div class="login-logo">
            <div class="login-logo-circle">
                <svg width="56" height="56" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <!-- Caja de paquete -->
                    <rect x="16" y="22" width="22" height="18" rx="2" fill="#f59e0b" stroke="#d97706" stroke-width="1.5"/>
                    <line x1="27" y1="22" x2="27" y2="40" stroke="#d97706" stroke-width="1.5"/>
                    <rect x="22" y="22" width="10" height="6" rx="1" fill="#fcd34d"/>
                    <!-- Pin de ubicación -->
                    <circle cx="36" cy="18" r="7" fill="#7c3aed" stroke="#5b21b6" stroke-width="1.5"/>
                    <circle cx="36" cy="17" r="2.5" fill="white"/>
                    <path d="M36 24 L36 30" stroke="#7c3aed" stroke-width="2" stroke-linecap="round"/>
                    <!-- Líneas de velocidad -->
                    <path d="M10 28 L16 28" stroke="#7c3aed" stroke-width="2" stroke-linecap="round"/>
                    <path d="M8 33 L16 33" stroke="#7c3aed" stroke-width="2" stroke-linecap="round"/>
                    <path d="M11 38 L16 38" stroke="#7c3aed" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </div>
        </div>

        <!-- Tagline -->
        <div class="login-tagline">
            <span class="tagline-line"></span>
            <span class="tagline-text">— ENTREGAMOS LO QUE IMPORTA —</span>
            <span class="tagline-line"></span>
        </div>

        <!-- Título -->
        <h2 class="login-title">
            Iniciar sesión<br>
            <span>panel de control</span>
        </h2>

        <!-- Mensajes de error -->
        <div th:if="${param.error}" class="login-alert">
            Credenciales incorrectas. Intenta nuevamente.
        </div>
        <div th:if="${param.logout}" class="login-alert-success">
            Sesión cerrada correctamente.
        </div>

        <!-- Formulario -->
        <form th:action="@{/login}" action="/login" method="post" class="login-form">
            <div class="login-field">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="" required autocomplete="off">
            </div>
            <div class="login-field">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="" required>
            </div>
            <button type="submit" class="login-btn">Ingresar</button>
        </form>

    </div>

</body>
</html>
