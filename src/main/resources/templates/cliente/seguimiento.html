<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiRoute - Seguimiento</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">LogiRoute</div>
        <div class="nav-links">
            <a th:href="@{/cliente/seguimiento}" class="active">Seguimiento</a>
            <a th:href="@{/logout}" class="btn-logout">Salir</a>
        </div>
    </nav>

    <div class="container">
        <h1>Seguimiento de Pedido</h1>

        <form th:action="@{/cliente/seguimiento}" method="get" class="search-form">
            <div class="form-group">
                <label for="codigo">Código de Pedido</label>
                <input type="text" id="codigo" name="codigo" th:value="${codigo}"
                       placeholder="Ej: PED12345678" required>
            </div>
            <button type="submit" class="btn btn-primary">Buscar</button>
        </form>

        <div th:if="${pedido}" class="result-card">
            <h2>Estado del Pedido</h2>
            <div class="detail-grid">
                <div class="detail-item">
                    <strong>Código:</strong>
                    <span th:text="${pedido.codigo}"></span>
                </div>
                <div class="detail-item">
                    <strong>Estado:</strong>
                    <span class="badge" th:text="${pedido.estado}"></span>
                </div>
                <div class="detail-item">
                    <strong>Origen:</strong>
                    <span th:text="${pedido.direccionOrigen}"></span>
                </div>
                <div class="detail-item">
                    <strong>Destino:</strong>
                    <span th:text="${pedido.direccionDestino}"></span>
                </div>
                <div class="detail-item" th:if="${pedido.repartidorNombre}">
                    <strong>Repartidor:</strong>
                    <span th:text="${pedido.repartidorNombre}"></span>
                </div>
            </div>
        </div>

        <div th:if="${codigo and pedido == null}" class="alert alert-warning">
            No se encontró un pedido con el código: <span th:text="${codigo}"></span>
        </div>
    </div>
</body>
</html>
