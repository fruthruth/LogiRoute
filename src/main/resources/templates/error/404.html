<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiRoute - Página no encontrada</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg-primary: #0f0a1a;
            --bg-secondary: #16112a;
            --bg-card: rgba(255,255,255,0.04);
            --border: rgba(255,255,255,0.06);
            --purple-main: #7c3aed;
            --purple-mid: #a855f7;
            --purple-light: #c084fc;
            --white: #ffffff;
            --text-primary: rgba(255,255,255,0.9);
            --text-secondary: rgba(255,255,255,0.5);
            --text-muted: rgba(255,255,255,0.3);
            --font-main: 'Sora', sans-serif;
            --font-body: 'DM Sans', sans-serif;
        }
        html, body {
            font-family: var(--font-body);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .bg-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.25;
            pointer-events: none;
        }
        .bg-glow-1 {
            background: var(--purple-main);
            top: -200px;
            left: -100px;
        }
        .bg-glow-2 {
            background: var(--purple-mid);
            bottom: -200px;
            right: -100px;
            opacity: 0.15;
        }

        .error-container {
            position: relative;
            z-index: 1;
            text-align: center;
            max-width: 500px;
            width: 90%;
            padding: 3rem 2.5rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            backdrop-filter: blur(20px);
        }

        .error-brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            margin-bottom: 2rem;
        }

        .error-brand-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--purple-main), var(--purple-mid));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(124,58,237,0.4);
        }

        .error-brand-name {
            font-family: var(--font-main);
            font-weight: 800;
            font-size: 1.1rem;
            color: var(--white);
        }

        .error-code {
            font-family: var(--font-main);
            font-size: 7rem;
            font-weight: 800;
            line-height: 1;
            background: linear-gradient(135deg, var(--purple-main), var(--purple-mid), var(--purple-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .error-title {
            font-family: var(--font-main);
            font-weight: 700;
            font-size: 1.3rem;
            color: var(--white);
            margin-bottom: 0.5rem;
        }

        .error-desc {
            font-size: 0.92rem;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .error-actions {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.7rem 1.5rem;
            border-radius: 12px;
            font-family: var(--font-main);
            font-size: 0.88rem;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--purple-main), var(--purple-mid));
            color: var(--white);
            box-shadow: 0 4px 20px rgba(124,58,237,0.35);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 28px rgba(124,58,237,0.5);
            color: var(--white);
        }

        .btn-ghost {
            background: rgba(255,255,255,0.06);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .btn-ghost:hover {
            background: rgba(255,255,255,0.1);
            color: var(--white);
            border-color: rgba(255,255,255,0.12);
        }

        .error-divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, var(--purple-main), var(--purple-mid));
            border-radius: 2px;
            margin: 0 auto 1.5rem;
        }

        @media (max-width: 480px) {
            .error-container { padding: 2rem 1.5rem; }
            .error-code { font-size: 5rem; }
            .error-title { font-size: 1.1rem; }
            .error-actions { flex-direction: column; }
            .btn { justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <div class="error-container">
        <div class="error-brand">
            <div class="error-brand-icon">
                <svg width="24" height="24" viewBox="0 0 32 32" fill="none">
                    <path d="M8 20l4-8 4 4 4-6 4 10" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <span class="error-brand-name">LogiRoute</span>
        </div>

        <div class="error-code">404</div>
        <div class="error-divider"></div>
        <h1 class="error-title">Página no encontrada</h1>
        <p class="error-desc">La ruta que intentas acceder no existe o fue movida. Verifica la dirección o regresa al inicio.</p>

        <div class="error-actions">
            <a href="#" onclick="history.back(); return false;" class="btn btn-ghost">
                &larr; Volver atrás
            </a>
            <a th:href="@{/}" href="/" class="btn btn-primary">
                Ir al inicio &rarr;
            </a>
        </div>
    </div>
</body>
</html>
